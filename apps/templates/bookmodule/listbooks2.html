<h1>Books List - Part 2</h1>

<a href="{% url 'addbook_part2' %}">Add New Book</a>

<table border="1">

    <tr>

        <th>ID</th>

        <th>Title</th>

        <th>Author</th>

        <th>Price</th>

        <th>Edition</th>

        <th>Actions</th>

    </tr>

    {% for book in books %}

    <tr>

        <td>{{ book.id }}</td>

        <td>{{ book.title }}</td>

        <td>{{ book.author }}</td>

        <td>{{ book.price }}</td>

        <td>{{ book.edition }}</td>

        <td>

            <a href="{% url 'editbook_part2' book.id %}">Edit</a>

            <a href="{% url 'deletebook_part2' book.id %}">Delete</a>

        </td>

    </tr>

    {% endfor %}

</table>
